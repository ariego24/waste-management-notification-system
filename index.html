\\\<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waste Management System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
    }
    header {
      background-color: #007bff;
      color: white;
      text-align: center;
      padding: 20px;
    }
    header h1 {
      margin: 0;
    }
    nav {
      background-color: #343a40;
      display: flex;
      justify-content: center;
      padding: 10px 0;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    .form-section, .records-section {
      margin-bottom: 20px;
    }
    .form-section h2, .records-section h2 {
      color: #007bff;
      border-bottom: 2px solid #007bff;
      display: inline-block;
      margin-bottom: 10px;
    }
    .form-section form input, .form-section form select, .form-section form button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      max-width: 400px;
      font-size: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    table, th, td {
      border: 1px solid #ddd;
    }
    th, td {
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #007bff;
      color: white;
    }
    footer {
      text-align: center;
      background: #007bff;
      color: white;
      padding: 15px 0;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Waste Management System</h1>
    <p>Efficient tracking and segregation of waste.</p>
  </header>
  
  <nav>
    <a href="#add-waste">Add Waste</a>
    <a href="#records">View Records</a>
    <a href="#about">About</a>
  </nav>

  <div class="container">
    <section class="form-section" id="add-waste">
      <h2>Add Waste Record</h2>
      <form id="wasteForm">
        <select name="wasteType" id="wasteType" required>
          <option value="">Select Waste Type</option>
          <option value="Organic">Organic</option>
          <option value="Recyclable">Recyclable</option>
          <option value="Hazardous">Hazardous</option>
          <option value="General">General</option>
        </select>
        <input type="number" name="quantity" id="quantity" placeholder="Quantity (kg)" required>
        <input type="text" name="location" id="location" placeholder="Location" required>
        <button type="button" onclick="addWasteRecord()">Add Record</button>
      </form>
    </section>

    <section class="records-section" id="records">
      <h2>Waste Records</h2>
      <table id="recordsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Type</th>
            <th>Quantity (kg)</th>
            <th>Location</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="4" style="text-align: center;">No records available.</td>
          </tr>
        </tbody>
      </table>
    </section>
  </div>

  <footer>
    <p>&copy; 2024 Waste Management System. All Rights Reserved.</p>
  </footer>

  <script>
    let records = [];
    
    function addWasteRecord() {
      const wasteType = document.getElementById("wasteType").value;
      const quantity = document.getElementById("quantity").value;
      const location = document.getElementById("location").value;

      if (wasteType && quantity && location) {
        records.push({ wasteType, quantity, location });
        updateRecordsTable();
        document.getElementById("wasteForm").reset();
      } else {
        alert("Please fill all fields before submitting.");
      }
    }

    function updateRecordsTable() {
      const tableBody = document.querySelector("#recordsTable tbody");
      tableBody.innerHTML = "";
      records.forEach((record, index) => {
        const row = `<tr>
          <td>${index + 1}</td>
          <td>${record.wasteType}</td>
          <td>${record.quantity} kg</td>
          <td>${record.location}</td>
        </tr>`;
        tableBody.innerHTML += row;
      });

      if (records.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No records available.</td></tr>';
      }
    }
  </script>
</body>
</html>
